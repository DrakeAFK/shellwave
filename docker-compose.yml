services:
  shellwave:
    build: .
    image: shellwave:latest
    container_name: shellwave
    restart: unless-stopped
    ports:
      # Defaults to binding only on localhost. Set SHELLWAVE_BIND to your
      # Tailscale IP if you want direct tailnet access, e.g.:
      # SHELLWAVE_BIND=100.80.71.61 docker compose up -d
      - "${SHELLWAVE_BIND:-127.0.0.1}:4000:4000"
    volumes:
      - ./data:/data
      # Allows the container's tailscale CLI to query the host tailscaled daemon
      # for tailnet import. The import parser still hides this ShellWave host.
      - /var/run/tailscale:/var/run/tailscale
    environment:
      - SHELLWAVE_DATA=/data/shellwave.db
      # Optional: configure TLS
      # - SHELLWAVE_TLS_CERT=/data/cert.pem
      # - SHELLWAVE_TLS_KEY=/data/key.pem
      
      # Optional: allow public SSH hosts
      # - SHELLWAVE_ALLOW_PUBLIC_HOSTS=true
      
      # Optional: add extra allowed internal hosts/networks
      # - SHELLWAVE_HOST_ALLOWLIST_EXTRA=192.168.1.0/24,my-server.local
