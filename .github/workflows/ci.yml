name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Go Vet
        run: go vet ./...

      - name: Go Test
        run: go test -v ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm ci

      - name: Svelte Check
        working-directory: ./web
        run: npm run check

      - name: Build Frontend
        working-directory: ./web
        run: npm run build

      - name: Test Docker Build
        run: docker build -t shellwave:test .